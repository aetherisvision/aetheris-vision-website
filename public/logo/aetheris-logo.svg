<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!--
    Aetheris Vision — Orthographic Globe Wireframe + AV Monogram
    Globe center (200, 195), radius 164.
    Meridian half-ellipses: rx = R·sin(λ), ry = R.
    Parallels clipped to globe circle.
  -->
  <defs>
    <clipPath id="globe-clip">
      <circle cx="200" cy="195" r="164"/>
    </clipPath>
  </defs>

  <!-- ── Globe grid lines (clipped to sphere boundary) ── -->
  <g stroke="rgba(200,200,200,0.42)" stroke-width="1.25" fill="none" clip-path="url(#globe-clip)">

    <!-- Longitude meridians — half-ellipses from north pole (200,31) to south pole (200,359) -->
    <!-- 0° meridian (vertical diameter) -->
    <line x1="200" y1="31" x2="200" y2="359"/>

    <!-- ±22.5°: rx = 164·sin 22.5° ≈ 62.8 -->
    <path d="M200,31 A62.8,164 0 0,1 200,359"/>
    <path d="M200,31 A62.8,164 0 0,0 200,359"/>

    <!-- ±45°: rx = 164·sin 45° ≈ 115.9 -->
    <path d="M200,31 A115.9,164 0 0,1 200,359"/>
    <path d="M200,31 A115.9,164 0 0,0 200,359"/>

    <!-- ±67.5°: rx = 164·sin 67.5° ≈ 151.5 -->
    <path d="M200,31 A151.5,164 0 0,1 200,359"/>
    <path d="M200,31 A151.5,164 0 0,0 200,359"/>

    <!-- Latitude parallels — horizontal lines clipped to globe -->
    <!-- Equator: y = 195 -->
    <line x1="20" y1="195" x2="380" y2="195"/>

    <!-- ±25°: y = 195 ∓ 164·sin 25° ≈ 195 ∓ 69.3 -->
    <line x1="20" y1="125.7" x2="380" y2="125.7"/>
    <line x1="20" y1="264.3" x2="380" y2="264.3"/>

    <!-- ±50°: y = 195 ∓ 164·sin 50° ≈ 195 ∓ 125.6 -->
    <line x1="20" y1="69.4"  x2="380" y2="69.4"/>
    <line x1="20" y1="320.6" x2="380" y2="320.6"/>

    <!-- ±75°: y = 195 ∓ 164·sin 75° ≈ 195 ∓ 158.4 -->
    <line x1="20" y1="36.6"  x2="380" y2="36.6"/>
    <line x1="20" y1="353.4" x2="380" y2="353.4"/>

  </g>

  <!-- Globe boundary circle (drawn over grid for clean crisp edge) -->
  <circle cx="200" cy="195" r="164" stroke="rgba(210,210,210,0.54)" stroke-width="1.5" fill="none"/>

  <!-- ── AV Monogram — white serif letterforms ── -->
  <text
    x="38"
    y="328"
    font-family="Georgia, 'Times New Roman', 'Palatino Linotype', serif"
    font-size="220"
    font-weight="400"
    fill="white"
    letter-spacing="-12">AV</text>

</svg>